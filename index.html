<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IBAM Simulados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <div id="app">
      
      <!-- Cabeçalho Global (Simples e funcional) -->
      <header class="app-header">
        <div class="container header-container">
          <div class="header-logo-container">
            <span class="header-title">SIMULADOS ds CAMARADAS DO APOSCALYPSO</span>
          </div>
          <div class="header-controls">
            <div id="timer" class="timer">00:00:00</div>
            <button id="btn-finish" class="btn-danger hidden">Finalizar Prova</button>
          </div>
        </div>
      </header>

      <main class="container">
        
        <!-- Tela de Início -->
        <div id="start-screen" class="card text-center mt-8 hidden">
          <img src="/logo.webp" alt="Logo" class="start-logo mx-auto mb-4" />
          <h1 class="text-xl font-bold mb-2">Simulado IBAM</h1>
          <p id="exam-title" class="text-gray-600 mb-6"></p>
          
          <div class="flex justify-center gap-4 mb-6">
            <span class="badge"><span id="q-count">0</span> Questões</span>
            <span class="badge">Assistente Social</span>
          </div>

          <div class="mode-selector mb-6">
            <label class="toggle-switch">
              <input type="checkbox" id="mode-toggle">
              <span class="slider"></span>
              <span class="text-sm font-semibold text-gray-700 ml-2">Modo Treino (Sem tempo limite)</span>
            </label>
          </div>

          <button id="btn-start" class="btn-primary px-8 py-3">Começar Simulado</button>
        </div>

        <!-- Tela da Questão -->
        <div id="exam-screen" class="hidden">
          
          <!-- Grid de Navegação Simplificado (Opcional, em cima) -->
          <div class="navigation-panel card mb-6 mt-6">
            <h3 class="text-sm font-semibold text-gray-700 mb-2">Navegação da Prova</h3>
            <div id="question-grid" class="question-grid"></div>
          </div>

          <!-- O Card Clássico da Concurseira Pobre -->
          <div class="question-card">
            
            <!-- Faixa escura no topo com as infos -->
            <div class="card-banner">
              <div><strong>Cargo:</strong> Assistente Social</div>
              <div id="card-edital"><strong>Edital:</strong> 01/2026</div>
              <div><strong>Ano:</strong> 2026</div>
              <div id="card-banca"><strong>Banca:</strong> IBAM</div>
              <div id="card-disciplina"><strong>Disciplina:</strong> Língua Portuguesa</div>
            </div>

            <!-- Conteúdo da Questão -->
            <div class="question-content">
              
              <div id="question-text" class="question-text text-sm text-gray-700">
                <!-- Text injected here -->
              </div>

              <!-- Alternativas -->
              <div id="options-container" class="options-container mt-6">
                <!-- Buttons injected here -->
              </div>
              
              <!-- Footer do card: Botão de verificar -->
              <div class="card-footer mt-6">
                <button id="btn-check" class="btn-check hidden">Verificar Resposta</button>
              </div>

            </div>
          </div>

          <!-- Navegação Anterior / Próxima -->
          <div class="pagination flex justify-between mt-6 mb-12">
            <button id="btn-prev" class="btn-secondary" disabled>&larr; Anterior</button>
            <span id="current-q-number" class="text-sm font-semibold text-gray-600 self-center">Questão 1</span>
            <button id="btn-next" class="btn-primary">Próxima &rarr;</button>
          </div>

        </div>

        <!-- Tela de Resultados -->
        <div id="results-screen" class="card text-center mt-8 hidden max-w-md mx-auto">
          <h1 class="text-xl font-bold mb-6 text-gray-900">Resultado do Simulado</h1>
          
          <div class="text-6xl font-extrabold text-blue-600 mb-6" id="score-text">0%</div>

          <div class="flex justify-center gap-8 mb-8 text-left">
            <div>
              <p class="text-sm text-gray-500 uppercase tracking-wide">Acertos</p>
              <p class="text-2xl font-bold text-green-600" id="res-correct">0</p>
            </div>
            <div>
              <p class="text-sm text-gray-500 uppercase tracking-wide">Total</p>
              <p class="text-2xl font-bold text-gray-900" id="res-total">0</p>
            </div>
            <div>
              <p class="text-sm text-gray-500 uppercase tracking-wide">Tempo</p>
              <p class="text-2xl font-bold text-gray-900" id="res-time">00:00:00</p>
            </div>
          </div>
          
          <button id="btn-restart" class="btn-secondary w-full py-3">Fazer Novamente</button>
        </div>

      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
